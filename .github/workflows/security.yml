name: Security
on:
  pull_request:
  push: { branches: [main] }
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - name: Backend audit
        working-directory: backend
        run: npm ci && npm audit --omit=dev --audit-level=high
      - name: Frontend audit
        working-directory: frontend
        run: npm ci && npm audit --omit=dev --audit-level=high
